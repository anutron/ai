---
layout: default
---

<div class="container" style="max-width: 800px;">

  <p class="text-muted small mt-3">
    <a href="{{ site.baseurl }}/" class="text-muted">← back to A-stack</a>
  </p>

  {% if page.image %}
  <img src="{{ site.baseurl }}{{ page.image }}" alt="{{ page.title }}" class="w-100 rounded mb-4" style="image-rendering: auto;">
  {% endif %}

  <h1 class="font-weight-bold mb-3">{{ page.title }}</h1>

  {% if page.summary %}
  <p class="lead text-muted mb-4">{{ page.summary }}</p>
  {% endif %}

  <div class="page-content">
    {{ content }}
  </div>

</div>
