# Site
name: 'AI Ron'
description: "Aaron Newton's notes, skills, and tools for working with AI."
logo: 'assets/images/logo.png'
favicon: 'assets/images/favicon.ico'
baseurl: ''
url: 'https://ai.anutron.com'
email: 'aaron@anutron.com'

include: ["_pages"]
permalink: /post/:title/

# Collections
collections:
  kit:
    output: true
    permalink: /kit/:path/
    sort_by: order
  feed:
    output: true
    permalink: /feed/:path/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag

authors:
  aaron:
    name:           Aaron Newton
    site:           https://anutron.com
    avatar:         assets/images/avatar-aaron.jpg
    bio:            "Chief Data Officer & cofounder at Thanx. Building Aaron-shaped tooling around Claude Code, illustrated guides, and AI workflows."
    email:          aaron@anutron.com
    twitter:        https://twitter.com/anutron
    linkedin:       https://www.linkedin.com/in/anewton/

# Defaults
defaults:
  # all posts
  - scope:
      path: "_posts"
    values:
      layout: post
      author: aaron
      avatar: assets/images/avatar-aaron.jpg

  # all pages
  - scope:
      path: "_pages"
    values:
      layout: page

  # all kit items
  - scope:
      path: ""
      type: "kit"
    values:
      layout: kit-item

  # all feed items
  - scope:
      path: ""
      type: "feed"
    values:
      layout: feed-item
      author: aaron

# Syntax
markdown: kramdown
highlighter: rouge

# Paginate
paginate: 10

# Allow posts/notes dated today
future: true

# Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - docker-compose.yml
